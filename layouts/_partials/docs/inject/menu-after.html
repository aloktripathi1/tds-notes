<style>
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    margin: 8px 0;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--body-font-color);
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: 8px;
    width: calc(100% - 0px);
    text-align: left;
    transition: background 0.2s, border-color 0.2s, opacity 0.15s;
    font-family: inherit;
  }

  .theme-toggle:hover {
    opacity: 0.8;
    border-color: var(--color-link);
  }

  .theme-toggle .toggle-icon {
    font-size: 1rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .theme-toggle .toggle-track {
    margin-left: auto;
    width: 32px;
    height: 18px;
    border-radius: 9px;
    background: var(--gray-200);
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  html.dark .theme-toggle .toggle-track {
    background: var(--color-link);
  }

  .theme-toggle .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: white;
    transition: transform 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  html.dark .theme-toggle .toggle-thumb {
    transform: translateX(14px);
  }

  /* Global theme transition */
  html {
    transition: background-color 0.2s, color 0.2s;
  }
</style>

<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
  <span class="toggle-icon" id="toggle-icon">🌙</span>
  <span id="toggle-label">Dark mode</span>
  <span class="toggle-track">
    <span class="toggle-thumb"></span>
  </span>
</button>

<script>
  function applyTheme(dark) {
    document.documentElement.classList.toggle('dark', dark);
    document.documentElement.classList.toggle('light', !dark);
    var icon = document.getElementById('toggle-icon');
    var label = document.getElementById('toggle-label');
    if (icon) icon.textContent = dark ? '☀️' : '🌙';
    if (label) label.textContent = dark ? 'Light mode' : 'Dark mode';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }

  function toggleTheme() {
    applyTheme(!document.documentElement.classList.contains('dark'));
  }

  (function () {
    var saved = localStorage.getItem('theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved ? saved === 'dark' : prefersDark);
  })();
</script>
