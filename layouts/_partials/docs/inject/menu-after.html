<style>
  .dark-mode-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 0.9rem;
    color: inherit;
    background: none;
    border: none;
    width: 100%;
    text-align: left;
  }
  .dark-mode-toggle:hover { opacity: 0.7; }

  html.dark {
    --body-background: #2e3440;
    --body-font-color: #eceff4;
    --color-link: #81a1c1;
    --color-visited-link: #81a1c1;
    --icon-filter: brightness(0) invert(1);
    --gray-100: #3b4252;
    --gray-200: #434c5e;
    --gray-500: #d8dee9;
  }
  html.light {
    --body-background: white;
    --body-font-color: black;
    --color-link: #0055bb;
    --color-visited-link: #5500bb;
    --icon-filter: none;
    --gray-100: #f8f9fa;
    --gray-200: #e9ecef;
    --gray-500: #adb5bd;
  }
</style>

<button class="dark-mode-toggle" id="theme-toggle" onclick="toggleTheme()">
  🌙 Dark Mode
</button>

<script>
  function applyTheme(dark) {
    document.documentElement.classList.toggle('dark', dark);
    document.documentElement.classList.toggle('light', !dark);
    document.getElementById('theme-toggle').textContent = dark ? '☀️ Light Mode' : '🌙 Dark Mode';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }

  function toggleTheme() {
    applyTheme(!document.documentElement.classList.contains('dark'));
  }

  (function () {
    const saved = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved ? saved === 'dark' : prefersDark);
  })();
</script>
