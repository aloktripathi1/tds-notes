site_name: TDS Notes
site_description: Technical Documentation & Study Notes
repo_url: https://github.com/your-username/tds-notes
repo_name: tds-notes

theme:
  name: readthedocs

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - File Formats & Data Handling: '1. File Formats & Data Handling.md'
  - Shell & Command Line: '2. Shell & Command Line.md'
  - README: ../README.md
